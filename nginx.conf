# KATASHIE VPN — Nginx Configuration
# Reverse proxy: Web Panel + WhatsApp Bot Webhook

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── HTTP → HTTPS redirect ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ─── KATASHIE VPN Web Panel ─────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name VOTRE_DOMAINE.COM;

        ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.COM/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com";

        # Landing page (public — no auth)
        location = / {
            proxy_pass http://katashie-web:2087;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # API routes with rate limiting
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://katashie-web:2087;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://katashie-web:2087;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE support (monitoring stream)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://katashie-web:2087;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ─── WhatsApp Webhook ───────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name wa.VOTRE_DOMAINE.COM;

        ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE.COM/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.COM/privkey.pem;

        location /whatsapp {
            proxy_pass http://katashie-whatsapp-bot:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
